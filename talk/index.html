<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Asistente de Voz IA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" type="image/svg" href="icons/robot.svg">

</head>

<body onload="cargar()">

    <div class="assistant-card">

        <div class="assistant-header">
            <h2>🤖 Asistente de Voz IA</h2>
            <small>Groq + Qwen3-32B</small>
        </div>

        <div id="chat-window" class="markdown-body"></div>

        <div class="controls">

            <div class="text-center">
                <span id="estado">
                    Listo para escuchar
                </span>
            </div>

            <div class="row g-3">

                <div class="col-md-3">
                    <button id="btnMic" class="btn btn-primary btn-action w-100">
                        🎤 Hablar
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn btn-warning btn-action w-100" onclick="callar()">
                        🤫 Cállate
                    </button>
                </div>

                <div class="col-md-3">
                    <button class="btn btn-danger btn-action w-100" onclick="borrar()">
                        🗑️ Borrar
                    </button>
                </div>

                <div class="col-md-3">
                    <a class="btn btn-success w-100" href="qr/qr.png">
                        📱 Escanear QR
                    </a>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.0/dist/purify.min.js"></script>

    <script src="js/main.js"></script>

</body>

</html>
