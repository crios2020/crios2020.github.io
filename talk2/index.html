<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Asistente IA por Voz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.0/dist/purify.min.js"></script>
</head>

<body onload="cargar()">

<div class="container py-4">

    <div class="assistant-card">

        <div class="assistant-header">

            <h2 class="mb-1">
                🤖 Asistente IA
            </h2>

            <small>
                Groq + Qwen3-32B
            </small>

        </div>

        <div id="chat-window"
             class="markdown-body">
        </div>

        <div class="controls">

            <div class="row g-2">

                <div class="col-12 col-md-4">
                    <button id="btnMic"
                            class="btn btn-success btn-action w-100">
                        🎤 Activar Micrófono
                    </button>
                </div>

                <div class="col-12 col-md-4">
                    <button id="btnMute"
                            class="btn btn-warning btn-action w-100">
                        🤫 Cállate
                    </button>
                </div>

                <div class="col-12 col-md-4">
                    <button id="btnClear"
                            class="btn btn-danger btn-action w-100">
                        🗑️ Limpiar
                    </button>
                </div>

            </div>

            <div class="text-center mt-3">

                <span id="estado">
                    Micrófono apagado
                </span>

            </div>

        </div>

    </div>

</div>

<script src="js/main.js"></script>

</body>

</html>
